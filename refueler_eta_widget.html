
<!DOCTYPE html>
<html>
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0D0D0B;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    padding: 24px;
  }

  .controls {
    display: flex;
    gap: 8px;
    margin-bottom: 40px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .ctrl-btn {
    background: #1C1C19;
    border: 0.5px solid rgba(255,255,255,0.12);
    color: rgba(240,237,232,0.55);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .ctrl-btn:hover { border-color: rgba(255,255,255,0.24); color: #F0EDE8; }
  .ctrl-btn.active { border-color: #F5820A; color: #F5820A; background: rgba(245,130,10,0.08); }

  .widget {
    width: 100%;
    max-width: 360px;
    background: #141412;
    border-radius: 16px;
    border: 0.5px solid rgba(255,255,255,0.08);
    padding: 32px 28px 28px;
    position: relative;
    overflow: hidden;
  }

  /* Subtle ambient glow behind the arc — color shifts per state */
  .widget::before {
    content: '';
    position: absolute;
    top: -60px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 200px;
    border-radius: 50%;
    opacity: 0.06;
    transition: background 0.6s ease;
    pointer-events: none;
  }
  .widget.state-progress::before  { background: #F5820A; }
  .widget.state-ready::before     { background: #2ECC71; }
  .widget.state-delay::before     { background: #0EA5C9; }

  /* Vendor + item row */
  .order-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
  }
  .venue-dot {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: #1C1C19;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .order-name {
    font-size: 15px;
    font-weight: 500;
    color: #F0EDE8;
    line-height: 1.3;
  }
  .order-venue {
    font-size: 12px;
    color: rgba(240,237,232,0.4);
    margin-top: 2px;
    font-weight: 400;
  }

  /* Arc SVG container */
  .arc-container {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
    position: relative;
  }
  .arc-svg { overflow: visible; }

  .arc-track {
    fill: none;
    stroke: rgba(255,255,255,0.06);
    stroke-width: 4;
    stroke-linecap: round;
  }
  .arc-fill {
    fill: none;
    stroke-width: 4;
    stroke-linecap: round;
    transition: stroke-dashoffset 1.2s cubic-bezier(0.4, 0, 0.2, 1),
                stroke 0.6s ease;
  }

  /* Center time display */
  .arc-center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -42%);
    text-align: center;
  }
  .time-value {
    font-family: 'DM Mono', monospace;
    font-size: 36px;
    font-weight: 500;
    line-height: 1;
    transition: color 0.5s ease;
    letter-spacing: -0.02em;
  }
  .time-label {
    font-size: 11px;
    color: rgba(240,237,232,0.35);
    font-weight: 400;
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* Status message */
  .status-block {
    text-align: center;
    margin-bottom: 24px;
  }
  .status-headline {
    font-size: 17px;
    font-weight: 400;
    color: #F0EDE8;
    line-height: 1.4;
    letter-spacing: -0.01em;
    transition: opacity 0.3s ease;
  }
  .status-sub {
    font-size: 13px;
    color: rgba(240,237,232,0.45);
    margin-top: 6px;
    line-height: 1.5;
    font-weight: 400;
    transition: opacity 0.3s ease;
  }

  /* Action row */
  .action-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 20px;
    border-top: 0.5px solid rgba(255,255,255,0.06);
  }
  .sats-earned {
    font-size: 12px;
    color: rgba(240,237,232,0.35);
    font-weight: 400;
  }
  .sats-value {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    color: #F5820A;
    margin-top: 2px;
  }

  .collect-btn {
    background: transparent;
    border: 0.5px solid rgba(255,255,255,0.15);
    color: rgba(240,237,232,0.55);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 9px 18px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    gap: 6px;
    opacity: 0.5;
    pointer-events: none;
  }
  .collect-btn.active {
    opacity: 1;
    pointer-events: all;
    border-color: #2ECC71;
    color: #2ECC71;
    background: rgba(46,204,113,0.06);
  }
  .collect-btn.active:hover {
    background: rgba(46,204,113,0.12);
  }

  /* State label badge */
  .state-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 20px;
    transition: background 0.5s, color 0.5s, border-color 0.5s;
  }
  .state-badge.progress { background: rgba(245,130,10,0.1); color: #F5820A; border: 0.5px solid rgba(245,130,10,0.25); }
  .state-badge.ready    { background: rgba(46,204,113,0.1); color: #2ECC71; border: 0.5px solid rgba(46,204,113,0.25); }
  .state-badge.delay    { background: rgba(14,165,201,0.1); color: #0EA5C9; border: 0.5px solid rgba(14,165,201,0.25); }

  .badge-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
  }
  .badge-dot.pulse {
    animation: pulse-dot 2.4s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }

  /* NFC prompt (ready state only) */
  .nfc-prompt {
    background: rgba(46,204,113,0.06);
    border: 0.5px solid rgba(46,204,113,0.18);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.4s ease, transform 0.4s ease;
    pointer-events: none;
  }
  .nfc-prompt.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: all;
  }
  .nfc-icon { font-size: 20px; }
  .nfc-text { font-size: 13px; color: #2ECC71; font-weight: 400; line-height: 1.4; }

</style>
</head>
<body>

<div class="controls">
  <button class="ctrl-btn active" id="btn-progress" onclick="setState('progress')">In progress</button>
  <button class="ctrl-btn" id="btn-delay" onclick="setState('delay')">Slight delay</button>
  <button class="ctrl-btn" id="btn-ready" onclick="setState('ready')">Ready</button>
</div>

<div class="widget state-progress" id="widget">

  <div class="order-meta">
    <div class="venue-dot">☕</div>
    <div>
      <div class="order-name">Flat white</div>
      <div class="order-venue">Fenchurch Street · Platform 1</div>
    </div>
  </div>

  <div style="text-align:center">
    <div class="state-badge progress" id="badge">
      <div class="badge-dot pulse" id="badge-dot"></div>
      <span id="badge-label">Being made</span>
    </div>
  </div>

  <div class="arc-container">
    <svg class="arc-svg" width="180" height="110" viewBox="0 0 180 110">
      <!-- Track arc: 220° sweep starting from 160° -->
      <path
        class="arc-track"
        id="arc-track"
        d=""
      />
      <path
        class="arc-fill"
        id="arc-fill"
        d=""
        stroke="#F5820A"
        stroke-dasharray="1"
        stroke-dashoffset="0"
      />
    </svg>
    <div class="arc-center">
      <div class="time-value" id="time-value" style="color:#F5820A">4:22</div>
      <div class="time-label" id="time-label">estimated</div>
    </div>
  </div>

  <div class="nfc-prompt" id="nfc-prompt">
    <div class="nfc-icon">📲</div>
    <div class="nfc-text">Tap your phone at the collection point, or show the QR to collect.</div>
  </div>

  <div class="status-block">
    <div class="status-headline" id="status-headline">Your order is being made.</div>
    <div class="status-sub" id="status-sub">You have time. It will be ready when you arrive.</div>
  </div>

  <div class="action-row">
    <div>
      <div class="sats-earned">Reward on collection</div>
      <div class="sats-value">⚡ 186 sats</div>
    </div>
    <button class="collect-btn" id="collect-btn">Collect ↗</button>
  </div>

</div>

<script>
const cx = 90, cy = 90, r = 72;
const startAngle = 160 * Math.PI / 180;
const endAngle   = 380 * Math.PI / 180; // 220° sweep
const sweepAngle = endAngle - startAngle;

function polarToXY(angle) {
  return {
    x: cx + r * Math.cos(angle),
    y: cy + r * Math.sin(angle)
  };
}

function arcPath(fromAngle, toAngle) {
  const s = polarToXY(fromAngle);
  const e = polarToXY(toAngle);
  const largeArc = (toAngle - fromAngle) > Math.PI ? 1 : 0;
  return `M ${s.x} ${s.y} A ${r} ${r} 0 ${largeArc} 1 ${e.x} ${e.y}`;
}

// Full track path
const trackPath = arcPath(startAngle, endAngle);
document.getElementById('arc-track').setAttribute('d', trackPath);

// We'll simulate fill via dasharray trick on a full arc
// Length of arc = r * sweepAngle
const arcLength = r * sweepAngle; // ~276

const states = {
  progress: {
    fillPct: 0.45,
    strokeColor: '#F5820A',
    timeValue: '4:22',
    timeLabel: 'estimated',
    timeColor: '#F5820A',
    badgeClass: 'progress',
    badgeLabel: 'Being made',
    pulse: true,
    headline: 'Your order is being made.',
    sub: 'You have time. It will be ready when you arrive.',
    nfc: false,
    collect: false
  },
  delay: {
    fillPct: 0.65,
    strokeColor: '#0EA5C9',
    timeValue: '+2',
    timeLabel: 'mins extra',
    timeColor: '#0EA5C9',
    badgeClass: 'delay',
    badgeLabel: 'A little longer',
    pulse: true,
    headline: 'Taking slightly longer than usual.',
    sub: 'Nothing to worry about — still on its way.',
    nfc: false,
    collect: false
  },
  ready: {
    fillPct: 1.0,
    strokeColor: '#2ECC71',
    timeValue: 'Ready',
    timeLabel: 'at the counter',
    timeColor: '#2ECC71',
    badgeClass: 'ready',
    badgeLabel: 'Ready to collect',
    pulse: false,
    headline: 'Your flat white is at the counter.',
    sub: 'Tap your phone to collect and earn your sats.',
    nfc: true,
    collect: true
  }
};

function setState(name) {
  const s = states[name];
  const widget = document.getElementById('widget');
  const arcFill = document.getElementById('arc-fill');
  const badge = document.getElementById('badge');
  const badgeDot = document.getElementById('badge-dot');
  const badgeLabel = document.getElementById('badge-label');
  const timeValue = document.getElementById('time-value');
  const timeLabel = document.getElementById('time-label');
  const headline = document.getElementById('status-headline');
  const sub = document.getElementById('status-sub');
  const nfc = document.getElementById('nfc-prompt');
  const collect = document.getElementById('collect-btn');

  // Widget state class
  widget.className = `widget state-${name}`;

  // Arc fill
  const fillLength = arcLength * s.fillPct;
  arcFill.setAttribute('d', trackPath);
  arcFill.style.stroke = s.strokeColor;
  arcFill.style.strokeDasharray = `${arcLength}`;
  arcFill.style.strokeDashoffset = `${arcLength - fillLength}`;

  // Badge
  badge.className = `state-badge ${s.badgeClass}`;
  badgeLabel.textContent = s.badgeLabel;
  badgeDot.className = s.pulse ? 'badge-dot pulse' : 'badge-dot';

  // Time
  timeValue.textContent = s.timeValue;
  timeValue.style.color = s.timeColor;
  timeValue.style.fontSize = name === 'ready' ? '26px' : '36px';
  timeLabel.textContent = s.timeLabel;

  // Copy
  headline.textContent = s.headline;
  sub.textContent = s.sub;

  // NFC
  nfc.className = s.nfc ? 'nfc-prompt visible' : 'nfc-prompt';

  // Collect button
  collect.className = s.collect ? 'collect-btn active' : 'collect-btn';

  // Controls
  ['progress','delay','ready'].forEach(id => {
    document.getElementById(`btn-${id}`).className = `ctrl-btn${id===name?' active':''}`;
  });
}

// Init arc fill
setState('progress');
</script>
</body>
</html>
