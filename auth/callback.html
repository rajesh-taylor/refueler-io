<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Signing in — Refueler</title>
<style>
  body { margin:0; padding:0; background:#141517; color:#E4E2DC; font-family:'DM Sans',system-ui,-apple-system,sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; text-align:center; }
  .box { padding:24px; }
  .spinner { width:24px; height:24px; border:2px solid #35373B; border-top-color:#E4E2DC; border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  p { font-size:13px; color:#8A8680; }
  a { color:#E4E2DC; text-decoration:underline; }
</style>
</head>
<body>
<div class="box">
  <div class="spinner"></div>
  <p id="msg">Opening Refueler…</p>
  <p id="fallback" style="display:none;">
    Didn't open automatically? <a id="manual-link" href="#">Tap here</a>.
  </p>
</div>
<script>
  (function () {
    var params = new URLSearchParams(window.location.search);
    var code = params.get('code');
    var errorDescription = params.get('error_description');

    if (errorDescription) {
      document.getElementById('msg').textContent = 'Sign-in failed: ' + errorDescription;
      return;
    }

    if (!code) {
      document.getElementById('msg').textContent = 'Missing sign-in code. Please request a new link.';
      return;
    }

    var appUrl = 'refuelerapp://login-callback?code=' + encodeURIComponent(code);
    document.getElementById('manual-link').href = appUrl;
    document.getElementById('fallback').style.display = 'block';

    window.location.href = appUrl;
  })();
</script>
</body>
</html>
