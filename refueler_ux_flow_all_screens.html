
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.flow-wrap{padding:1rem 0 2rem}
.screen-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;gap:8px}
.nav-btn{padding:8px 16px;font-size:12px;font-weight:500;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-secondary);cursor:pointer;transition:all 0.15s}
.nav-btn:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
.nav-btn:disabled{opacity:0.3;cursor:not-allowed}
.screen-counter{font-size:11px;font-family:var(--font-mono);color:var(--color-text-secondary);text-align:center;flex:1}
.phone-wrap{display:flex;justify-content:center;margin-bottom:1.25rem}
.phone{width:260px;min-height:480px;border:0.5px solid var(--color-border-secondary);border-radius:28px;background:var(--color-background-primary);overflow:hidden;display:flex;flex-direction:column}
.phone-bar{height:32px;display:flex;align-items:center;justify-content:center;padding:0 16px;flex-shrink:0}
.phone-notch{width:60px;height:5px;background:var(--color-border-secondary);border-radius:3px}
.phone-screen{flex:1;padding:20px 18px 24px;display:flex;flex-direction:column}
.screen-label{font-size:9px;font-family:var(--font-mono);color:var(--color-text-secondary);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:16px;opacity:0.7}
.s-wordmark{font-size:18px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px;color:var(--color-text-primary)}
.s-wordmark span{color:#D4690A}
.s-tag{font-size:10px;font-family:var(--font-mono);color:var(--color-text-secondary);margin-bottom:28px}
.s-headline{font-size:16px;font-weight:500;line-height:1.3;letter-spacing:-0.02em;margin-bottom:8px;color:var(--color-text-primary)}
.s-body{font-size:12px;line-height:1.6;color:var(--color-text-secondary);margin-bottom:20px;flex:1}
.s-cta{display:block;width:100%;padding:12px;text-align:center;font-size:13px;font-weight:500;border-radius:var(--border-radius-md);background:#D4690A;color:#fff;border:none;cursor:pointer;margin-bottom:8px}
.s-ghost{display:block;width:100%;padding:11px;text-align:center;font-size:13px;color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:transparent;cursor:pointer;margin-bottom:8px}
.s-input-row{border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:10px 12px;font-size:13px;color:var(--color-text-primary);margin-bottom:8px;background:var(--color-background-secondary)}
.s-input-placeholder{color:var(--color-text-secondary)}
.check-list{list-style:none;display:flex;flex-direction:column;gap:10px;margin-bottom:20px;flex:1}
.check-list li{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--color-text-secondary)}
.check-list li.done{color:var(--color-text-primary)}
.check-icon{width:18px;height:18px;border-radius:50%;border:0.5px solid var(--color-border-secondary);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px}
.check-icon.ticked{background:#1E8A4A;border-color:#1E8A4A;color:#fff}
.check-icon.active{border-color:#D4690A;color:#D4690A}
.venue-row{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.venue-dot{width:28px;height:28px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500}
.venue-info{flex:1}
.venue-name{font-size:12px;font-weight:500;color:var(--color-text-primary)}
.venue-dist{font-size:10px;color:var(--color-text-secondary);font-family:var(--font-mono)}
.item-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.item-row:last-child{border-bottom:none}
.item-name{font-size:12px;color:var(--color-text-primary)}
.item-price{font-size:12px;font-family:var(--font-mono);color:var(--color-text-secondary)}
.item-qty{display:flex;align-items:center;gap:6px}
.qty-btn{width:20px;height:20px;border-radius:4px;border:0.5px solid var(--color-border-secondary);background:transparent;font-size:12px;display:flex;align-items:center;justify-content:center;color:var(--color-text-secondary);cursor:pointer}
.qty-val{font-size:12px;font-weight:500;color:var(--color-text-primary);min-width:12px;text-align:center}
.confirm-block{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px;margin-bottom:12px}
.confirm-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0}
.confirm-row.total{font-weight:500;color:var(--color-text-primary);border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:4px}
.confirm-label{color:var(--color-text-secondary)}
.payment-option{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.payment-option.selected{border-color:#D4690A}
.pay-icon{font-size:18px}
.pay-label{font-size:12px;font-weight:500;color:var(--color-text-primary)}
.pay-sub{font-size:10px;color:var(--color-text-secondary)}
.eta-venue-strip{background:#C8102E;border-radius:10px 10px 0 0;padding:10px 14px;display:flex;align-items:center;gap:8px}
.eta-venue-logo{width:24px;height:24px;border-radius:4px;background:#F2E0C8;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:500;color:#8B0000}
.eta-venue-name{font-size:12px;font-weight:500;color:#F2E0C8}
.eta-venue-addr{font-size:9px;color:rgba(242,224,200,0.65)}
.eta-carbon{background:#141412;border-radius:0 0 10px 10px;padding:14px;flex:1;display:flex;flex-direction:column;align-items:center}
.eta-time{font-size:36px;font-weight:500;font-family:var(--font-mono);color:#F0EDE8;letter-spacing:-0.02em;line-height:1}
.eta-status{font-size:11px;color:rgba(240,237,232,0.45);margin-top:6px;margin-bottom:14px;font-style:italic}
.eta-item-row{font-size:11px;color:rgba(240,237,232,0.6);margin-bottom:4px}
.eta-sats{font-size:10px;font-family:var(--font-mono);color:rgba(240,237,232,0.38);margin-top:10px}
.collect-screen{display:flex;flex-direction:column;align-items:center;padding-top:8px}
.qr-block{width:80px;height:80px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;background:var(--color-background-secondary)}
.reward-big{font-size:28px;font-weight:500;font-family:var(--font-mono);color:#D4690A;text-align:center;margin-bottom:4px}
.reward-label{font-size:11px;color:var(--color-text-secondary);text-align:center;margin-bottom:16px}
.wallet-row{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.wallet-icon{font-size:18px;color:var(--color-text-secondary)}
.wallet-label{font-size:12px;font-weight:500;color:var(--color-text-primary)}
.wallet-sub{font-size:10px;color:var(--color-text-secondary)}
.settings-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.settings-row:last-child{border-bottom:none}
.settings-label{font-size:12px;color:var(--color-text-primary)}
.settings-sub{font-size:10px;color:var(--color-text-secondary)}
.toggle-pill{width:32px;height:18px;border-radius:9px;background:#1E8A4A;display:flex;align-items:center;padding:0 2px}
.toggle-pill.off{background:var(--color-border-secondary)}
.toggle-knob{width:14px;height:14px;border-radius:50%;background:white;margin-left:auto}
.toggle-pill.off .toggle-knob{margin-left:0;margin-right:auto}
.screen-meta{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem}
.meta-screen-id{font-size:10px;font-family:var(--font-mono);color:#D4690A;font-weight:500;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px}
.meta-purpose{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:6px;line-height:1.3}
.meta-body{font-size:12px;color:var(--color-text-secondary);line-height:1.6;margin-bottom:10px}
.meta-next{font-size:11px;font-family:var(--font-mono);color:var(--color-text-secondary);padding-top:8px;border-top:0.5px solid var(--color-border-tertiary)}
.meta-next span{color:var(--color-text-primary)}
.progress-dots{display:flex;justify-content:center;gap:5px;margin-bottom:1rem}
.dot{width:5px;height:5px;border-radius:50%;background:var(--color-border-secondary);transition:background 0.2s}
.dot.active{background:#D4690A}
.dot.visited{background:var(--color-border-primary)}
</style>

<h2 class="sr-only">Refueler UX flow — 14 screens from cold open to settings</h2>

<div class="flow-wrap">
  <div class="progress-dots" id="dots"></div>
  <div class="screen-nav">
    <button class="nav-btn" id="prev-btn" onclick="go(-1)" disabled>← prev</button>
    <div class="screen-counter" id="counter">1 / 14</div>
    <button class="nav-btn" id="next-btn" onclick="go(1)">next →</button>
  </div>
  <div class="phone-wrap">
    <div class="phone" id="phone">
      <div class="phone-bar"><div class="phone-notch"></div></div>
      <div class="phone-screen" id="phone-screen"></div>
    </div>
  </div>
  <div class="screen-meta" id="screen-meta"></div>
</div>

<script>
const screens = [
  {
    id:"01",
    label:"App open · cold start",
    render:()=>`
      <div class="screen-label">screen 01 · cold open</div>
      <div style="flex:1;display:flex;flex-direction:column;justify-content:center">
        <div class="s-wordmark">RE<span>FUELER</span></div>
        <div class="s-tag">London · Lightning</div>
        <div class="s-headline" style="font-size:13px;margin-bottom:20px">Order ahead. Skip the queue.<br>Earn real Bitcoin.</div>
      </div>
      <button class="s-cta">Get started</button>
      <button class="s-ghost">See how it works</button>`,
    purpose:"First impression. No permissions asked. No cookie banner. No friction.",
    detail:"Paper theme. Wordmark. One-line proposition. Two paths: start now, or learn first. Nothing else on screen. The product earns attention before it asks for anything.",
    next:"→ Screen 03 (discovery) or Screen 04 (sign up)"
  },
  {
    id:"02",
    label:"App open · returning user",
    render:()=>`
      <div class="screen-label">screen 02 · returning user</div>
      <div style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:12px">
        <i class="ti ti-fingerprint" style="font-size:48px;color:var(--color-text-secondary)" aria-hidden="true"></i>
        <div style="font-size:13px;color:var(--color-text-secondary)">Use Face ID to sign in</div>
        <div style="font-size:11px;font-family:var(--font-mono);color:var(--color-border-secondary)">or sign in with email</div>
      </div>
      <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px;margin-bottom:8px">
        <div style="font-size:10px;color:var(--color-text-secondary);margin-bottom:2px">Active order</div>
        <div style="font-size:12px;font-weight:500;color:var(--color-text-primary)">Flat white · Costa Fenchurch St</div>
        <div style="font-size:10px;font-family:var(--font-mono);color:#D4690A">Being prepared for you</div>
      </div>`,
    purpose:"Sub-second return to authenticated state. Active order surfaced immediately.",
    detail:"Passkey / Face ID prompt on open. If an order is in progress, a status banner shows before auth completes — the user sees their order is moving before they've done anything. Sats balance visible post-auth. Zero friction.",
    next:"→ Account overview (authenticated)"
  },
  {
    id:"03",
    label:"Discovery / landing",
    render:()=>`
      <div class="screen-label">screen 03 · discovery</div>
      <div class="s-headline">Your order starts before you arrive.</div>
      <div class="s-body">
        <div style="padding:10px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:12px;display:flex;gap:10px;align-items:flex-start">
          <i class="ti ti-train" style="font-size:16px;color:#D4690A;flex-shrink:0;margin-top:1px" aria-hidden="true"></i>
          <span>Detects when your train is moving. Asks if you want your usual. Done.</span>
        </div>
        <div style="padding:10px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:12px;display:flex;gap:10px;align-items:flex-start">
          <i class="ti ti-bolt" style="font-size:16px;color:#D4690A;flex-shrink:0;margin-top:1px" aria-hidden="true"></i>
          <span>Every purchase earns sats. Real Bitcoin. Not points.</span>
        </div>
        <div style="padding:10px 0;font-size:12px;display:flex;gap:10px;align-items:flex-start">
          <i class="ti ti-shield-lock" style="font-size:16px;color:#D4690A;flex-shrink:0;margin-top:1px" aria-hidden="true"></i>
          <span>Your phone works out where you are. We never see it.</span>
        </div>
      </div>
      <button class="s-cta">Get started</button>`,
    purpose:"Three statements. Non-bitcoiner first. Bitcoin visible but not leading.",
    detail:"No jargon. No 'revolutionary'. Just what the app does in plain English. The three statements cover: convenience, reward, privacy — in that order. The sats line is specific ('Real Bitcoin. Not points.') but doesn't alienate someone who doesn't know what sats are yet.",
    next:"→ Screen 04 (sign up)"
  },
  {
    id:"04",
    label:"Sign up / sign in",
    render:()=>`
      <div class="screen-label">screen 04 · sign in</div>
      <div class="s-headline" style="margin-bottom:6px">What's your email?</div>
      <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:20px">We'll send a link. No password needed.</div>
      <div class="s-input-row"><span class="s-input-placeholder">your@email.com</span></div>
      <button class="s-cta" style="margin-top:4px">Send me a link</button>
      <div style="margin-top:16px;font-size:10px;color:var(--color-text-secondary);text-align:center;line-height:1.5">
        By continuing you accept our<br>
        <span style="color:var(--color-text-primary);text-decoration:underline">terms</span> and <span style="color:var(--color-text-primary);text-decoration:underline">privacy policy</span>
      </div>`,
    purpose:"Email only. Magic link. No password. No friction.",
    detail:"One field. One button. The link expires in 10 minutes. On first successful login, a Passkey prompt fires once — never again. Returning users bypass this screen entirely via Face ID. Sensitive actions (wallet linking, deletion) require a fresh magic link regardless of active session.",
    next:"→ Magic link email → Passkey prompt (first login) → Screen 05 (onboarding)"
  },
  {
    id:"05",
    label:"Onboarding checklist",
    render:()=>`
      <div class="screen-label">screen 05 · onboarding</div>
      <div class="s-headline" style="margin-bottom:4px">A few things to set up</div>
      <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:16px">Each one takes seconds.</div>
      <ul class="check-list" style="flex:1">
        <li class="done"><div class="check-icon ticked"><i class="ti ti-check" style="font-size:9px" aria-hidden="true"></i></div>Sign in</li>
        <li class="done"><div class="check-icon active"><i class="ti ti-bell" style="font-size:9px" aria-hidden="true"></i></div>Allow notifications</li>
        <li><div class="check-icon"><i class="ti ti-train" style="font-size:9px;color:var(--color-border-secondary)" aria-hidden="true"></i></div>Enable order-ahead</li>
        <li><div class="check-icon"><i class="ti ti-shopping-bag" style="font-size:9px;color:var(--color-border-secondary)" aria-hidden="true"></i></div>Place your first order</li>
        <li><div class="check-icon"><i class="ti ti-bolt" style="font-size:9px;color:var(--color-border-secondary)" aria-hidden="true"></i></div>Choose your reward</li>
      </ul>
      <button class="s-ghost">Skip for now</button>`,
    purpose:"Progressive disclosure. Permissions earned in context, not demanded upfront.",
    detail:"Five steps. Sign-in pre-ticked. Notifications fires OS prompt in context — user has already seen the product's value. Geofence explained before asking: 'Your phone detects your train is moving. We never see where you are.' Reward choice (sats or loyalty stamps) comes last — sets expectations before first order. All steps dismissible.",
    next:"→ Step by step, or dismiss to Screen 06"
  },
  {
    id:"06",
    label:"Venue discovery",
    render:()=>`
      <div class="screen-label">screen 06 · venues</div>
      <div style="display:flex;gap:8px;margin-bottom:14px">
        <div style="flex:1;background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 10px;display:flex;align-items:center;gap:6px">
          <i class="ti ti-search" style="font-size:14px;color:var(--color-text-secondary)" aria-hidden="true"></i>
          <span style="font-size:12px;color:var(--color-text-secondary)">Search venues</span>
        </div>
        <div style="border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:8px 10px;display:flex;align-items:center">
          <i class="ti ti-map" style="font-size:14px;color:var(--color-text-secondary)" aria-hidden="true"></i>
        </div>
      </div>
      <div class="venue-row">
        <div class="venue-dot" style="background:#C8102E;color:#F2E0C8">Co</div>
        <div class="venue-info"><div class="venue-name">Costa Coffee</div><div class="venue-dist">Fenchurch St · open</div></div>
        <i class="ti ti-chevron-right" style="font-size:14px;color:var(--color-text-secondary)" aria-hidden="true"></i>
      </div>
      <div class="venue-row">
        <div class="venue-dot" style="background:#006B38;color:#F0C040">M&S</div>
        <div class="venue-info"><div class="venue-name">M&S Café</div><div class="venue-dist">Fenchurch St · open</div></div>
        <i class="ti ti-chevron-right" style="font-size:14px;color:var(--color-text-secondary)" aria-hidden="true"></i>
      </div>
      <div class="venue-row">
        <div class="venue-dot" style="background:#73222E;color:#E8D5B0">Pr</div>
        <div class="venue-info"><div class="venue-name">Pret a Manger</div><div class="venue-dist">Fenchurch St · open</div></div>
        <i class="ti ti-chevron-right" style="font-size:14px;color:var(--color-text-secondary)" aria-hidden="true"></i>
      </div>`,
    purpose:"Venue browse. Walk-in, walk-past, and pre-order all start here.",
    detail:"List or map toggle. Active venues shown with brand colours. Each tile: name, location, open/closed status. Future: live wait time. Walk-past nudges enter via push notification and deep-link directly to item selection. Geofence pre-orders bypass this screen entirely.",
    next:"→ Screen 07 (item selection)"
  },
  {
    id:"07",
    label:"Item selection",
    render:()=>`
      <div class="screen-label">screen 07 · menu</div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
        <div class="venue-dot" style="background:#C8102E;color:#F2E0C8;width:22px;height:22px;font-size:8px">Co</div>
        <div style="font-size:13px;font-weight:500;color:var(--color-text-primary)">Costa Coffee</div>
      </div>
      <div style="font-size:10px;font-family:var(--font-mono);color:var(--color-text-secondary);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.06em">Hot drinks</div>
      <div class="item-row">
        <div><div class="item-name">Flat white</div><div class="item-price">£3.75</div></div>
        <div class="item-qty"><div class="qty-btn">−</div><div class="qty-val">1</div><div class="qty-btn">+</div></div>
      </div>
      <div class="item-row">
        <div><div class="item-name">Americano</div><div class="item-price">£3.25</div></div>
        <div class="item-qty"><div class="qty-btn">−</div><div class="qty-val">0</div><div class="qty-btn">+</div></div>
      </div>
      <div class="item-row">
        <div><div class="item-name">Cappuccino</div><div class="item-price">£3.75</div></div>
        <div class="item-qty"><div class="qty-btn">−</div><div class="qty-val">0</div><div class="qty-btn">+</div></div>
      </div>
      <div style="margin-top:auto;padding-top:12px">
        <button class="s-cta">Review order · £3.75</button>
      </div>`,
    purpose:"Simple item selection. Qty controls. Running total on CTA.",
    detail:"Venue brand colour anchors the screen header. Categories listed vertically. Qty +/− per item. CTA updates live with total. No upsell, no cross-sell — the product respects the user's time. Customisation options (milk choice, size) expand inline per item in production.",
    next:"→ Screen 08 (order confirmation)"
  },
  {
    id:"08",
    label:"Order confirmation",
    render:()=>`
      <div class="screen-label">screen 08 · confirm</div>
      <div class="s-headline" style="margin-bottom:12px">Your order</div>
      <div class="confirm-block">
        <div class="confirm-row"><span class="confirm-label">Flat white</span><span>£3.75</span></div>
        <div class="confirm-row"><span class="confirm-label">Costa · Fenchurch St</span><span></span></div>
        <div class="confirm-row total"><span>Total</span><span>£3.75</span></div>
      </div>
      <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:12px;display:flex;align-items:center;gap:6px">
        <i class="ti ti-bolt" style="font-size:13px;color:#D4690A;opacity:0.6" aria-hidden="true"></i>
        <span style="font-family:var(--font-mono);font-size:10px;color:var(--color-text-secondary);opacity:0.6">186 sats on collection</span>
      </div>
      <button class="s-cta">Confirm and pay</button>
      <button class="s-ghost">Edit order</button>`,
    purpose:"One last look before payment. Sats reward visible in whisper style.",
    detail:"Clean summary. No surprises. Sats whisper shown here for the first time in this journey — no pill, no badge, just a quiet figure in DM Mono at reduced opacity. 'Confirm and pay' proceeds to payment. 'Edit order' returns to Screen 07 with selections preserved.",
    next:"→ Screen 09 (payment)"
  },
  {
    id:"09",
    label:"Payment",
    render:()=>`
      <div class="screen-label">screen 09 · payment</div>
      <div class="s-headline" style="margin-bottom:4px">How would you like to pay?</div>

let current = 0;

function buildDots(){
  const c = document.getElementById('dots');
  c.innerHTML='';
  screens.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='dot'+(i===0?' active':'');
    d.id='dot-'+i;
    c.appendChild(d);
  });
}

function render(){
  const s = screens[current];
  document.getElementById('phone-screen').innerHTML = s.render();
  document.getElementById('counter').textContent = (current+1)+' / '+screens.length+' · '+s.label;
  document.getElementById('screen-meta').innerHTML =
    `<div class="meta-screen-id">Screen ${s.id}</div>`+
    `<div class="meta-purpose">${s.purpose}</div>`+
    `<div class="meta-body">${s.detail}</div>`+
    `<div class="meta-next"><span>Next:</span> ${s.next}</div>`;
  document.getElementById('prev-btn').disabled = current===0;
  document.getElementById('next-btn').disabled = current===screens.length-1;
  document.getElementById('next-btn').textContent = current===screens.length-1 ? 'done' : 'next →';
  screens.forEach((_,i)=>{
    const d=document.getElementById('dot-'+i);
    d.className='dot'+(i===current?' active':i<current?' visited':'');
  });
}

function go(dir){
  current=Math.max(0,Math.min(screens.length-1,current+dir));
  render();
}

buildDots();
render();
</script>
