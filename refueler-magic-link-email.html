<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Your sign-in link — Refueler</title>
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <![endif]-->
</head>
<body style="margin:0;padding:0;background-color:#141517;font-family:'DM Sans',system-ui,-apple-system,sans-serif;">

  <!-- Preheader (hidden preview text) -->
  <div style="display:none;max-height:0;overflow:hidden;mso-hide:all;">
    Your Refueler sign-in link. Expires in 60 minutes.&nbsp;&#847;&nbsp;&#847;&nbsp;&#847;&nbsp;&#847;&nbsp;&#847;&nbsp;&#847;&nbsp;&#847;&nbsp;&#847;&nbsp;&#847;&nbsp;&#847;&nbsp;&#847;&nbsp;&#847;
  </div>

  <!-- Outer wrapper -->
  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#141517;min-width:320px;">
    <tr>
      <td align="center" style="padding:48px 16px 64px 16px;">

        <!-- Card -->
        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:520px;background-color:#1E1F22;border:1px solid #35373B;">
          <tr>
            <td style="padding:48px 48px 0 48px;">

              <!-- Wordmark -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="padding-bottom:48px;">
                    <span style="font-family:'DM Sans',system-ui,sans-serif;font-size:13px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:#E4E2DC;">REFUELER</span>
                  </td>
                </tr>
              </table>

              <!-- Rule -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="border-top:1px solid #35373B;padding-bottom:40px;font-size:0;line-height:0;">&nbsp;</td>
                </tr>
              </table>

              <!-- Body copy -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="padding-bottom:12px;">
                    <p style="margin:0;font-family:'DM Sans',system-ui,sans-serif;font-size:15px;line-height:1.7;color:#8A8680;letter-spacing:0;">
                      Here's your sign-in link.
                    </p>
                  </td>
                </tr>
                <tr>
                  <td style="padding-bottom:40px;">
                    <p style="margin:0;font-family:'DM Sans',system-ui,sans-serif;font-size:13px;line-height:1.7;color:#5A5751;">
                      It expires in 60 minutes. If you didn't request this, ignore it.
                    </p>
                  </td>
                </tr>
              </table>

              <!-- Button -->
              <table cellpadding="0" cellspacing="0" border="0" style="margin-bottom:48px;">
                <tr>
                  <td style="border:1px solid #E4E2DC;">
                    <a href="{{ .ConfirmationURL }}"
                       style="display:inline-block;padding:14px 32px;font-family:'DM Sans',system-ui,sans-serif;font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;text-decoration:none;color:#E4E2DC;background-color:transparent;mso-padding-alt:14px 32px;">
                      <!--[if mso]><i style="letter-spacing:32px;mso-font-width:-100%;mso-text-raise:30pt">&nbsp;</i><![endif]-->
                      SIGN IN TO REFUELER
                      <!--[if mso]><i style="letter-spacing:32px;mso-font-width:-100%">&nbsp;</i><![endif]-->
                    </a>
                  </td>
                </tr>
              </table>

            </td>
          </tr>

          <!-- Footer row -->
          <tr>
            <td style="padding:0 48px 40px 48px;">

              <!-- Rule above footer -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="border-top:1px solid #2E3035;padding-bottom:24px;font-size:0;line-height:0;">&nbsp;</td>
                </tr>
              </table>

              <!-- Footer text -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td>
                    <p style="margin:0;font-family:'DM Sans',system-ui,sans-serif;font-size:11px;line-height:1.6;color:#5A5751;">
                      refueler.io &middot; This is an automated message. Do not reply.
                    </p>
                  </td>
                </tr>
              </table>

            </td>
          </tr>

        </table>
        <!-- /Card -->

      </td>
    </tr>
  </table>

</body>
</html>
